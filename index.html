49\u060C \u0648\u0644\u0645\u0633\u0627\u062A\u0643 \u0641\u064A \u0627\u0644\u0627\u0647\u062A\u0645\u0627\u0645 \u0639\u0645\u0644\u064A\u0629 \u0645\u0644\u0645\u0648\u0633\u0629.",air:"\u0642\u0645\u0631\u0643 \u0641\u064A \u0628\u0631\u062C \u0647\u0648\u0627\u0626\u064A: \u0628\u062A\u0641\u0647\u0645\u064A \u0645\u0634\u0627\u0639\u0631\u0643 \u0628\u0627\u0644\u0643\u0644\u0627\u0645 \u2014 \u0644\u0627\u0632\u0645 \u062A\u062D\u0643\u064A \u0623\u0648 \u062A\u0643\u062A\u0628\u064A \u0639\u0634\u0627\u0646 \u062A\u0633\u062A\u0648\u0639\u0628\u064A \u0627\u0644\u0644\u064A \u062C\u0648\u0627\u0643\u064A. \u0627\u0644\u0645\u0646\u0627\u0642\u0634\u0629 \u0627\u0644\u0647\u0627\u062F\u064A\u0629 \u0628\u062A\u0631\u064A\u062D\u0643 \u0623\u0643\u062A\u0631 \u0645\u0646 \u0627\u0644\u0623\u062D\u0636\u0627\u0646 \u0627\u0644\u0635\u0627\u0645\u062A\u0629 \u0623\u062D\u064A\u0627\u0646\u064B\u0627.",water:"\u0642\u0645\u0631\u0643 \u0641\u064A \u0628\u0631\u062C \u0645\u0627\u0626\u064A: \u0645\u0634\u0627\u0639\u0631\u0643 \u0639\u0645\u064A\u0642\u0629 \u0648\u0628\u062A\u062D\u0633\u064A \u0628\u0645\u0634\u0627\u0639\u0631 \u063A\u064A\u0631\u0643 \u0643\u0623\u0646\u0647\u0627 \u0628\u062A\u0627\u0639\u062A\u0643. \u0645\u062D\u062A\u0627\u062C\u0629 \u0648\u0642\u062A \u0644\u0648\u062D\u062F\u0643 \u0639\u0634\u0627\u0646 \u062A\u0641\u0631\u063A\u064A \u0634\u062D\u0646\u0627\u062A \u0627\u0644\u064A\u0648\u0645 \u2014 \u062F\u0647 \u0645\u0634 \u0627\u0646\u0639\u0632\u0627\u0644\u060C \u062F\u0647 \u0635\u064A\u0627\u0646\u0629 \u0636\u0631\u0648\u0631\u064A\u0629 \u0644\u0642\u0644\u0628\u0643."},mercury:{fire:"\u0639\u0637\u0627\u0631\u062F \u0641\u064A \u0628\u0631\u062C \u0646\u0627\u0631\u064A: \u0643\u0644\u0627\u0645\u0643 \u0645\u0628\u0627\u0634\u0631 \u0648\u0633\u0631\u064A\u0639 \u0648\u0645\u0642\u0646\u0639\u060C \u0648\u0628\u062A\u0641\u0643\u0631\u064A \u0648\u0625\u0646\u062A\u064A \u0628\u062A\u062A\u0643\u0644\u0645\u064A. \u0639\u0646\u062F\u0643 \u0645\u0648\u0647\u0628\u0629 \u062A\u062D\u0645\u0651\u0633\u064A \u0627\u0644\u0646\u0627\u0633 \u0628\u0643\u0644\u0645\u0629 \u2014 \u0627\u0633\u062A\u062E\u062F\u0645\u064A\u0647\u0627.",earth:"\u0639\u0637\u0627\u0631\u062F \u0641\u064A \u0628\u0631\u062C \u062A\u0631\u0627\u0628\u064A: \u062A\u0641\u0643\u064A\u0631\u0643 \u0645\u0646\u0638\u0645 \u0648\u0639\u0645\u0644\u064A\u060C \u0628\u062A\u0627\u062E\u062F\u064A \u0648\u0642\u062A\u0643 \u0642\u0628\u0644 \u0645\u0627 \u062A\u062D\u0643\u0645\u064A\u060C \u0648\u0644\u0645\u0627 \u0628\u062A\u062A\u0643\u0644\u0645\u064A \u0643\u0644\u0627\u0645\u0643 \u0644\u0647 \u0648\u0632\u0646. \u0627\u0644\u0646\u0627\u0633 \u0628\u062A\u064A\u062C\u064A \u062A\u0627\u062E\u062F \u0631\u0623\u064A\u0643 \u0644\u0623\u0646\u0647 \u0645\u062F\u0631\u0648\u0633.",air:"\u0639\u0637\u0627\u0631\u062F \u0641\u064A \u0628\u0631\u062C \u0647\u0648\u0627\u0626\u064A: \u0639\u0642\u0644\u0643 \u0623\u0633\u0631\u0639 \u0645\u0646 \u0644\u0633\u0627\u0646\u0643 \u0648\u062F\u0647 \u0643\u062A\u064A\u0631! \u0628\u062A\u0631\u0628\u0637\u064A \u0623\u0641\u0643\u0627\u0631 \u0645\u0646 \u0645\u062C\u0627\u0644\u0627\u062A \u0645\u062E\u062A\u0644\u0641\u0629 \u0628\u0628\u0639\u0636 \u0628\u0633\u0647\u0648\u0644\u0629\u060C \u0648\u062F\u064A \u0645\u0648\u0647\u0628\u0629 \u0646\u0627\u062F\u0631\u0629 \u0641\u064A \u062D\u0644 \u0627\u0644\u0645\u0634\u0627\u0643\u0644.",water:"\u0639\u0637\u0627\u0631\u062F \u0641\u064A \u0628\u0631\u062C \u0645\u0627\u0626\u064A: \u0628\u062A\u0641\u0643\u0631\u064A \u0628\u0642\u0644\u0628\u0643 \u0648\u0639\u0642\u0644\u0643 \u0645\u0639 \u0628\u0639\u0636\u060C \u0648\u0628\u062A\u0644\u0642\u0637\u064A \u0627\u0644\u0644\u064A \u0628\u064A\u0646 \u0627\u0644\u0633\u0637\u0648\u0631. \u0630\u0627\u0643\u0631\u062A\u0643 \u0627\u0644\u0639\u0627\u0637\u0641\u064A\u0629 \u0642\u0648\u064A\u0629 \u2014 \u0628\u062A\u0641\u062A\u0643\u0631\u064A \u0627\u0644\u0625\u0
